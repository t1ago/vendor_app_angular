@if (showLabel) {
    <label [for]="inputId()" class="form-label">{{ label() }}</label>
}
@switch (type()) {
    @case ('select') {
        <select [formField]="activeField" class="form-select" [id]="inputId()" (change)="onChange.emit()">
            @for (option of options(); track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
            }
        </select>
    }
    @case ('radio') {
        @for (option of options(); track option.value) {
            <div class="form-check">
                <input
                    [formField]="activeField"
                    class="form-check-input"
                    type="radio"
                    [id]="inputId() + '_' + option.value"
                    value="{{ option.value }}" />
                <label class="form-check-label" [for]="inputId() + '_' + option.value">{{ option.label }}</label>
            </div>
        }
    }
    @case ('checkbox') {
        <div class="form-check form-switch">
            <input [formField]="fieldBool()!" class="form-check-input" type="checkbox" [id]="inputId()" />
            <label class="form-check-label" [for]="inputId()">{{ label() }}</label>
        </div>
    }
    @default {
        <input [formField]="activeField" [type]="type()" class="form-control" [id]="inputId()" (blur)="onBlur.emit()" />
    }
}
@if (activeFieldIsInvalid) {
    <div class="invalid-feedback d-block">
        @for (error of activeFieldErrors; track $index) {
            <small>{{ error.message | translate }}</small>
        }
    </div>
}
