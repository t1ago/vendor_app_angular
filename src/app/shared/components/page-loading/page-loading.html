@if (isLoading()) {
    <div class="d-flex justify-content-center align-items-center vh-100 bg-light opacity-75 position-fixed w-100 top-0 start-0" style="z-index: 9999;">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2 fw-bold text-primary">Buscando informação</p>
        </div>
    </div>
}
