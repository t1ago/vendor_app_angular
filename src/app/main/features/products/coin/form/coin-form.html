<app-page-loading></app-page-loading>
<div class="container">
    <form>
        <div class="row mb-3 mt-5">
            <div class="col">
                <h1>{{ 'MAIN.FEATURES.COIN.FORMTITLE' | translate }}</h1>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <app-input-field
                    [field]="formSymbol"
                    [label]="'MAIN.FEATURES.COIN.SYMBOL' | translate"
                    inputId="symbol"
                ></app-input-field>
            </div>
            <div class="col">
                <app-input-field
                    [field]="formName"
                    [label]="'MAIN.FEATURES.COIN.NAME' | translate"
                    inputId="name"
                ></app-input-field>
            </div>
        </div>
        <div class="row">
            <div class="col text-end d-grid d-sm-block gap-2">
                @if (isSaveAction) {
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                } @else {
                    <button (click)="onCancelAction()" type="button" class="btn btn-danger me-2">
                        <span>{{ 'COMMONS.CANCEL' | translate }}</span>
                    </button>
                    <button
                        [disabled]="isDisabledSaveAction"
                        (click)="onSaveAction()"
                        type="button"
                        class="btn btn-primary me-2"
                    >
                        <span>{{ 'COMMONS.SAVE' | translate }}</span>
                    </button>
                }
            </div>
        </div>
    </form>
</div>
