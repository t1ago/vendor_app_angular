<div class="row mb-3">
    <div class="col-12">
        <label class="form-label">{{typeLabel}}</label>
        <div class="d-flex gap-4">
            <app-input-field
                [type]="'radio'"
                [field]="formType"
                [label]="'formType'"
                inputId="formType"
                [options]="typeOptions()"
            />
        </div>
    </div>
</div>

<div class="row mb-3">
    <div class="col-3">
        <app-input-field [field]="formZipCode" [label]="zipCodeLabel" inputId="zipCode" (onBlur)="onZipCodeBlur()" />
    </div>

    <div class="col-6">
        <app-input-field [field]="formStreet" [label]="streetLabel" inputId="street" />
    </div>

    <div class="col-3">
        <app-input-field [field]="formNumber" [label]="numberLabel" inputId="number" />
    </div>
</div>

<div class="row mb-3">
    <div class="col-4">
        <app-input-field [field]="formNeighborhood" [label]="neighborhoodLabel" inputId="neighborhood" />
    </div>

    <div class="col-5">
        <app-input-field [field]="formCity" [label]="cityLabel" inputId="city" />
    </div>

    <div class="col-3">
        <app-input-field
            [type]="'select'"
            [field]="formState"
            [label]="stateLabel"
            [options]="stateOptions()"
            inputId="stateId"
        />
    </div>
</div>

<div class="row mb-3">
    <div class="col text-end d-grid d-sm-block gap-2">
        <button (click)="onCancelAction()" type="button" class="btn btn-danger me-2">
            <img src="assets/images/cancelar.png" />
            <span>Cancelar</span>
        </button>
        <button [disabled]="isDisabledSaveAction" (click)="onSaveAction()" type="button" class="btn btn-primary me-2">
            <img src="assets/images/salvar.png" />
            <span>Confirmar</span>
        </button>
    </div>
</div>
